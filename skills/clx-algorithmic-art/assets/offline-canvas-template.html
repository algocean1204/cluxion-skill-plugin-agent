<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seeded canvas study</title>
<style>
  html,body{margin:0;min-height:100%;background:#111;color:#eee;font:14px system-ui}
  main{display:grid;place-items:center;min-height:100vh}
  canvas{max-width:100%;height:auto}
</style>
<main><canvas id="art" width="1200" height="1200" aria-label="Generative artwork"></canvas></main>
<script>
  const canvas=document.querySelector('#art');
  const ctx=canvas.getContext('2d');
  let state=0x12345678;
  const random=()=>((state=(1664525*state+1013904223)>>>0)/4294967296);
  ctx.fillStyle='#111'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<1200;i+=1){
    const x=random()*canvas.width, y=random()*canvas.height;
    const radius=1+random()*7;
    ctx.fillStyle=`hsl(${190+random()*70} 70% ${45+random()*35}% / .35)`;
    ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2); ctx.fill();
  }
</script>
</html>
